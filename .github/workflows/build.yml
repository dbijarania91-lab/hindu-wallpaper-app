name: 🚀 Build & Release Hindu Wallpaper App

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'debug'
        type: choice
        options: [ debug, release ]

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true'

jobs:
  # ─── Job 1: Lint & Unit Tests ───────────────────────────────────────────────
  lint-and-test:
    name: 🧹 Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Write local.properties
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> local.properties
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> local.properties

      - name: Run Lint
        run: ./gradlew lint --stacktrace

      - name: Run Unit Tests
        run: ./gradlew test --stacktrace

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html

  # ─── Job 2: Debug Build ─────────────────────────────────────────────────────
  build-debug:
    name: 🔧 Debug Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Write local.properties
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> local.properties
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> local.properties

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: hindu-wallpaper-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ─── Job 3: Release Build & Sign ────────────────────────────────────────────
  build-release:
    name: 🏆 Release Build & Sign
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Write local.properties
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> local.properties
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> local.properties

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

      - name: Build Release APK
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -PKEYSTORE_PATH=keystore.jks \
            -PKEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}" \
            --stacktrace

      - name: Build Release AAB (for Play Store)
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -PKEYSTORE_PATH=keystore.jks \
            -PKEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}" \
            --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: hindu-wallpaper-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: hindu-wallpaper-aab-${{ github.sha }}
          path: app/build/outputs/bundle/release/*.aab

  # ─── Job 4: GitHub Release (on tag push) ────────────────────────────────────
  github-release:
    name: 📦 GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: hindu-wallpaper-release-${{ github.sha }}
          path: artifacts/apk

      - name: Download Release AAB
        uses: actions/download-artifact@v4
        with:
          name: hindu-wallpaper-aab-${{ github.sha }}
          path: artifacts/aab

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Hindu Wallpaper ${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🕉 Hindu Wallpaper App ${{ steps.version.outputs.VERSION }}

            ### What's New
            - Full HD image & live wallpaper collection
            - WhatsApp & Instagram status videos
            - Direct apply wallpaper (Home / Lock / Both)
            - Download to gallery
            - Trending section
            - iOS-style glassmorphism UI

            ### Downloads
            - **APK** — Direct install (enable Unknown Sources)
            - **AAB** — For Play Store upload

            ### Setup Required
            See README for AdMob & Supabase configuration.
          draft: false
          prerelease: false
          files: |
            artifacts/apk/*.apk
            artifacts/aab/*.aab

  # ─── Job 5: Play Store Upload (optional) ────────────────────────────────────
  play-store:
    name: 🏪 Play Store Upload
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v') && vars.UPLOAD_TO_PLAY_STORE == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: hindu-wallpaper-aab-${{ github.sha }}
          path: artifacts/aab

      - name: Upload to Play Store (Internal Track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.mahiinfo.hinduwallpaper
          releaseFiles: artifacts/aab/*.aab
          track: internal
          status: completed
          changesNotSentForReview: false
